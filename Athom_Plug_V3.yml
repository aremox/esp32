substitutions:
  name: "athom-smart-plug-v3"
  friendly_name: "Athom Plug V3 despacho"
  room: "Despacho"
  device_description: "Athom ESP32-C3 con Vigilante Web"
  project_name: "China Athom Technology.Smart Plug V3"
  project_version: "v2.0.2"
  relay_restore_mode: RESTORE_DEFAULT_ON
  sensor_update_interval: 10s
  current_limit : "16"
  dns_domain: ".local"
  # Zona horaria
  timezone: "Europe/Madrid"
  sntp_update_interval: 6h
  sntp_server_1: "0.pool.ntp.org"
  sntp_server_2: "1.pool.ntp.org"
  sntp_server_3: "2.pool.ntp.org"  
  wifi_fast_connect: "false"
  log_level: "INFO"
  hide_energy_sensor: "true"
  ipv6_enable: "false"
  power_plug_type: "power-socket-eu"
  # --- VIGILANTE ---
  comprobacion_cada: 120s
  max_fallos_y: "3"
  tiempo_apagado_z: 10s
  url_objetivo: "http://google.com"

########################## Fin de Substituciones #########################

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  comment: "${device_description}"
  area: "${room}"  
  name_add_mac_suffix: false

esp32:
  board: esp32-c3-devkitm-1
  variant: ESP32C3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "10" # Aumenta el tiempo del Watchdog a 20 segundos
      CONFIG_BT_ENABLED: y # <-- VOLVEMOS A ENCENDER EL CHIP BLUETOOTH
      CONFIG_BT_BLE_42_FEATURES_SUPPORTED: y
      CONFIG_BT_BLE_50_FEATURES_SUPPORTED: y

esp32_ble_tracker:
  scan_parameters:
    continuous: false
    # Bermuda necesita actualizaciones frecuentes, pero no podemos asfixiar al ESP32-C3
    interval: 520ms
    window: 100ms # Escanea el 78% del tiempo. Deja un margen para el WiFi y el HTTP.
    active: true  # CRÍTICO para Bermuda: permite leer iBeacons y dispositivos Apple correctamente.

bluetooth_proxy:
  # CRÍTICO PARA LA RAM: Lo ponemos en 'false'. 
  # Bermuda SOLO necesita rastrear balizas, no necesita conectarse a ellas para controlarlas.
  # Esto evita que el ESP32 colapse por saturación de conexiones.
  active: true

# Definimos el switch primero para que los scripts lo reconozcan
switch:
  - platform: gpio
    name: "Switch"
    pin: GPIO5
    id: relay_id
    restore_mode: ${relay_restore_mode}
    icon: mdi:${power_plug_type}

# Script de reinicio
script:
  - id: ciclo_reinicio_por_fallo
    mode: single
    then:
      - lambda: id(bloqueado_por_reinicio) = true; # Bloqueamos el intervalo
      - logger.log: "Web caída detectada. Reiniciando..."
      # Registramos el evento
      - lambda: |-
          id(total_reboot_count) += 1;
          id(ultima_accion_web).publish_state(id(sntp_time).now().strftime("%d/%m/%Y %H:%M:%S"));
      - switch.turn_off: relay_id
      - delay: ${tiempo_apagado_z}
      - switch.turn_on: relay_id      
      - lambda: id(contador_fallos) = 0;
      - logger.log: "Iniciando pausa de 10 minutos..."
      - delay: 10min
      - lambda: id(bloqueado_por_reinicio) = false; # Liberamos el intervalo
      - logger.log: "Pausa de 10 min terminada. Vigilancia reactivada."


globals:
  - id: contador_fallos
    restore_value: no
    type: int
    initial_value: '0'
  - id: total_energy
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: restore_mode
    type: int
    restore_value: yes
    initial_value: "2"
  - id: total_reboot_count
    type: int
    restore_value: yes # Para que no se borre al reiniciar el enchufe
    initial_value: '0'

  - id: bloqueado_por_reinicio
    type: bool
    initial_value: 'false'

  - id: peticion_en_curso
    type: bool
    initial_value: 'false'

# 1. Ajusta el componente HTTP para que sea más ligero
http_request:
  verify_ssl: false
  useragent: esphome/device
  timeout: 3s # No le des mucho tiempo para que no bloquee
# Sustituimos buffer_size por estos dos:
  buffer_size_tx: 1024
  buffer_size_rx: 2048 # Un poco más para la recepción por seguridad

# Lógica del vigilante simplificada
interval:
  - interval: ${comprobacion_cada}
    then:
      - http_request.get:
          url: ${url_objetivo}
          request_headers:
            Connection: close
          on_response:
            then:
              - lambda: |-
                  int status = response->status_code;
                  if ((status >= 200 && status < 400) || (id(bloqueado_por_reinicio) == true)) {
                    id(contador_fallos) = 0;
                    id(estado_web).publish_state(true);
                    ESP_LOGI("web_check", "Web OK: %d", status);
                  } else {
                    id(contador_fallos) += 1;
                    id(estado_web).publish_state(false);
                    ESP_LOGW("web_check", "Respuesta errónea: %d. Fallos: %d", status, id(contador_fallos));
                  }
          on_error:
            then:
              - lambda: |-
                  id(contador_fallos) += 1;
                  id(estado_web).publish_state(false);
                  ESP_LOGE("web_check", "Error de conexión/DNS. Fallos: %d", id(contador_fallos));

      # Evaluación del umbral de fallos
      - if:
          condition:
            lambda: 'return id(contador_fallos) >= atoi("${max_fallos_y}");'
          then:
            - script.execute: ciclo_reinicio_por_fallo

api:
  reboot_timeout: 2h

ota:
  - platform: esphome

logger:
  level: ${log_level}
  baud_rate: 0

web_server:
  port: 80
  version: 3

wifi:
  ssid: !secret wifi_ssid_despacho
  password: !secret wifi_password

uart:
  rx_pin: GPIO20
  baud_rate: 4800
  data_bits: 8
  stop_bits: 1
  parity: EVEN

select:
  - platform: template
    name: "Power On State"
    id: "power_mode"
    optimistic: true
    options:
      - "Always Off"
      - "Always On"
      - "Restore Power Off State"
    on_value:
      then:
        - lambda: |-
            if (x == "Always Off") id(restore_mode) = 1;
            else if (x == "Always On") id(restore_mode) = 2;
            else if (x == "Restore Power Off State") id(restore_mode) = 3;

binary_sensor:
  - platform: status
    name: "Status"
    icon: mdi:check-network-outline
    entity_category: diagnostic

  - platform: template
    name: "Estado Conexión Web"
    id: estado_web
    device_class: connectivity

  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    name: "Power Button"
    id: power_button
    disabled_by_default: false
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.2s
        then:
          - switch.toggle: relay_id
      - timing:
          - ON for at least 4s
        then:
          - button.press: Reset

sensor:
  - platform: uptime
    name: "Uptime Sensor"
    id: uptime_sensor
    type: timestamp
    entity_category: "diagnostic"

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"

  - platform: cse7766
    id: athom_cse7766
    current:
      name: "Current"
      icon: mdi:current-ac
      filters:
        - throttle_average: ${sensor_update_interval}
        - lambda: if (x < 0.060) return 0.0; else return x;
      on_value_range:
        - above: ${current_limit}
          then:
            - switch.turn_off: relay_id
    voltage:
      name: "Voltage"
      icon: mdi:sine-wave
      filters:
        - throttle_average: ${sensor_update_interval}
    power:
      name: "Power"
      id: power_sensor
      icon: mdi:power
      filters:
        - throttle_average: ${sensor_update_interval}
        - lambda: if (x < 3.0) return 0.0; else return x;
    energy:
      name: "Energy"
      id: energy
      icon: mdi:lightning-bolt
      unit_of_measurement: kWh
      internal: ${hide_energy_sensor}
      filters:
        - throttle: ${sensor_update_interval}
        - multiply: 0.001
      on_value:
        then:
          - lambda: |-
              static float previous_energy_value = 0.0;
              float current_energy_value = id(energy).state;
              id(total_energy) += current_energy_value - previous_energy_value;
              previous_energy_value = current_energy_value;
              id(total_energy_sensor).update();
    power_factor:
      name: "Power Factor"
      icon: mdi:percent-outline
      filters:
        - throttle_average: ${sensor_update_interval}

  - platform: template
    name: "Total Energy"
    id: total_energy_sensor
    unit_of_measurement: kWh
    device_class: "energy"
    state_class: "total_increasing"
    icon: mdi:lightning-bolt
    accuracy_decimals: 3
    lambda: |-
      return id(total_energy);
    update_interval: ${sensor_update_interval}

  - platform: total_daily_energy
    name: "Total Daily Energy"
    restore: true
    power_id: power_sensor
    unit_of_measurement: kWh
    icon: mdi:hours-24
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  - platform: template
    name: "Vigilante - Fallos Actuales"
    id: sensor_fallos_actuales
    icon: mdi:alert-circle-outline
    accuracy_decimals: 0
    unit_of_measurement: "intentos"
    lambda: return id(contador_fallos);
    update_interval: 10s

  - platform: template
    name: "Vigilante - Reinicios Totales"
    id: sensor_reboot_totales
    icon: mdi:counter
    accuracy_decimals: 0
    unit_of_measurement: "veces"
    lambda: return id(total_reboot_count);
    update_interval: 10s

button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config

# Botón para reiniciar el contador de fallos del vigilante
  - platform: template
    name: "Resetear Contador de Fallos"
    id: reset_fallos_button
    icon: mdi:refresh
    on_press:
      then:
        - lambda: id(contador_fallos) = 0;
        - binary_sensor.template.publish:
            id: estado_web
            state: ON
        - logger.log: "Contador de fallos reseteado manualmente"


light:
  - platform: status_led
    name: "Status LED"
    id: blue_led
    icon: mdi:lightbulb-outline
    disabled_by_default: true
    pin:
      inverted: true
      number: GPIO6
      
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "Mac Address"

  - platform: template
    name: 'Last Restart'
    id: device_last_restart
    icon: mdi:clock
    entity_category: diagnostic

  - platform: template
    name: "Vigilante - Última Acción"
    id: ultima_accion_web
    icon: mdi:clock-check-outline

time:
  - platform: sntp
    id: sntp_time
    timezone: "${timezone}"
    update_interval: ${sntp_update_interval}
    servers:
      - "${sntp_server_1}"
      - "${sntp_server_2}"
      - "${sntp_server_3}"    
    on_time_sync:
      then:
        - if:
            condition:
              lambda: 'return id(device_last_restart).state == "";'
            then:
              - text_sensor.template.publish:
                  id: device_last_restart
                  state: !lambda 'return id(sntp_time).now().strftime("%a %d %b %Y - %H:%M:%S");'
